apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-bccmusic-api
  namespace: bccmusic-api
  labels:
    app: ws-bccmusic-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ws-bccmusic-api
  template:
    metadata:
      labels:
        app: ws-bccmusic-api
      annotations:
        redeploy: "2026-04-04-v1"
    spec:
      containers:
        - name: backend
          image: ghcr.io/akkercheval/ws-bccmusic-api:sha-4f08396eecd9ff65a0b172360f639aa0da38f164
          imagePullPolicy:
            Always
            # Auto-updated by CI on 9bb36785eb44e4a8546df7fd583c595e9f86902f (build #29)
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 120 # was 10s
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 600 # was 10s
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 30
            periodSeconds: 10

          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:sqlserver://192.168.0.10:1433;databaseName=BCCMusic;encrypt=true;trustServerCertificate=true;"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus"
            # === Suppress actuator health-check logging ===
            - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_BOOT_ACTUATE
              value: "ERROR"
            - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB
              value: "WARN" # catches any request-filter noise
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
