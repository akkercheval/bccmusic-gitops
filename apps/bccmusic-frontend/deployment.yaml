apiVersion: apps/v1
kind: Deployment
metadata:
  name: bccmusic-frontend
  namespace: bccmusic-frontend
  labels:
    app: bccmusic-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bccmusic-frontend
  template:
    metadata:
      labels:
        app: bccmusic-frontend
      annotations:
        redeploy: "2026-04-04-v1"
    spec:
      containers:
        - name: frontend
          image: ghcr.io/akkercheval/bccmusic-frontend:sha-27c4e2c
          imagePullPolicy: Always
            # Auto-updated by CI - commit 27c4e2c9972e10d2d3f9041ef9c2d721092f5446 (short: sha-27c4e2c)
            # Auto-updated by CI on b500dc3c66fe13442877211fb1946e7276084feb
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # === Optional but recommended for a React frontend ===
          # Add these if your app sometimes needs time to start or to handle graceful shutdown
          # livenessProbe:
          #   httpGet:
          #     path: /          # or /index.html if you prefer
          #     port: 80
          #   initialDelaySeconds: 30
          #   periodSeconds: 30
          #   timeoutSeconds: 5
          #   failureThreshold: 3
          # readinessProbe:
          #   httpGet:
          #     path: /          # or a health endpoint if your frontend has one
          #     port: 80
          #   initialDelaySeconds: 10
          #   periodSeconds: 30
          #   timeoutSeconds: 3
          #   failureThreshold: 3
