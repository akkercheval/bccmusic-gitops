apiVersion: apps/v1
kind: Deployment
metadata:
  name: bccmusic-frontend
  namespace: bccmusic-frontend
  labels:
    app: bccmusic-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bccmusic-frontend
  template:
    metadata:
      labels:
        app: bccmusic-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/akkercheval/bccmusic-frontend:sha-b35b961cef1d7cd235eb69c311486b23fe61a038
          imagePullPolicy: Always
            # Auto-updated by CI on b35b961cef1d7cd235eb69c311486b23fe61a038
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
