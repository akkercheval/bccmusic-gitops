name: Pull GitOps Repo to k3s VM

on:
  push:
    branches: [main]
    paths:
      - "apps/**" # Trigger when you change manifests in GitOps
      - "infra/**"
      - "secrets/**"
  workflow_dispatch: # Allows manual trigger

jobs:
  deploy-gitops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo (optional)
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_PRIVATE_KEY }}

      - name: Pull latest GitOps repo on VM
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} "
            cd ~/bccmusic-gitops &&
            git fetch origin &&
            git reset --hard origin/main &&
            echo 'GitOps repo updated successfully at $(date)'
          "
