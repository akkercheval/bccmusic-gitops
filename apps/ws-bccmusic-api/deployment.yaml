apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-bccmusic-api
  namespace: bccmusic-api
  labels:
    app: ws-bccmusic-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ws-bccmusic-api
  template:
    metadata:
      labels:
        app: ws-bccmusic-api
      annotations:
        redeploy: "2026-04-03-v1"
    spec:
      containers:
        - name: backend
          image: ghcr.io/akkercheval/ws-bccmusic-api:${GIT_COMMIT_SHA}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          # === LIVENESS AND READINESS PROBES ===
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness # Spring Boot Actuator endpoint
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness # Spring Boot Actuator endpoint
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
