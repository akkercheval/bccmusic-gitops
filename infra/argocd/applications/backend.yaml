apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ws-bccmusic-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akkercheval/bccmusic-gitops.git
    targetRevision: main
    path: apps/ws-bccmusic-api
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
