apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bccmusic-frontend
  namespace: bccmusic-frontend
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
    - host: bccmusic.boonecountyin.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bccmusic-frontend
                port:
                  number: 80
