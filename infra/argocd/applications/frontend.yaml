apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bccmusic-frontend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/akkercheval/bccmusic-gitops.git
    targetRevision: main
    path: apps/bccmusic-frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: bccmusic-frontend # Dedicated namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
